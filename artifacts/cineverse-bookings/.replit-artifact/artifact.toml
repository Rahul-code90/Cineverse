kind = "web"
previewPath = "/"
title = "CineVerse — My Bookings"
version = "1.0.0"
id = "artifacts/cineverse-bookings"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18786

[services.development]
run = "pnpm --filter @workspace/cineverse-bookings run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cineverse-bookings", "run", "build" ]
publicDir = "artifacts/cineverse-bookings/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18786"
BASE_PATH = "/"
